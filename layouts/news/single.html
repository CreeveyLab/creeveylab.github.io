{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
  <div class="news-meta" style="justify-content: center; margin-top: 0.75rem;">
    <time class="news-date">{{ .Date.Format "2 January 2006" }}</time>
    {{ with .Params.type_tag }}<span class="news-tag news-tag-{{ . }}">{{ . }}</span>{{ end }}
    {{ with .Params.author }}<span class="news-author">{{ . }}</span>{{ end }}
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="news-single-body">
      {{ .Content }}
      <div style="margin-top: 2rem;">
        <a href="/news/" class="btn btn-secondary">← All News</a>
      </div>
    </div>
  </div>
</section>
{{ end }}

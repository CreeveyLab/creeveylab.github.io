pi:
  name: "Prof. Chris Creevey"
  photo: "/images/people/chris-creevey.jpeg"
  title: "Professor of Computational Biology"
  institution: "Institute for Global Food Security, Queen's University Belfast"
  initials: "CC"
  bio: "Professor of Computational Biology at the Institute for Global Food Security, Queen's University Belfast. His main interests are identifying the genomic factors influencing phenotypic changes in organisms from Bacteria to Eukaryotes with a focus on animal microbiomes. He received his Ph.D. in 2002 from the National University of Ireland for his work in the area of phylogenetics and comparative genomics, and has since held positions at NUI Maynooth, EMBL Heidelberg, Teagasc Ireland, and Aberystwyth University."
  email: "chris.creevey@qub.ac.uk"
  bluesky: "https://bsky.app/profile/hairyllama.bsky.social"
  linkedin: "https://www.linkedin.com/in/chris-creevey-4778a242/"
  scholar: "https://scholar.google.com/citations?user=7JkjEd4AAAAJ&hl=en"
  orcid: "https://orcid.org/0000-0001-7183-1555"


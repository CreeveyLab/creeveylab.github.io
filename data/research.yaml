themes:
  - icon: "amr"
    title: "Antimicrobial Resistance & One Health"
    description: "Understanding how AMR develops and spreads across human, animal, and environmental microbiomes using computational and phylogenetic approaches."
    tags: ["AMR", "Phylogenetics", "One Health", "Metagenomics"]
    subtopics:
      - title: "Multi-Drug Resistance Evolution & Transmission"
        description: "Tracking how resistance develops and spreads across the human-animal-environment interface using whole-genome sequencing and phylogenomics."
      - title: "Microbiome Responses to Antimicrobial Interventions"
        description: "Investigating the intended and unintended consequences of antimicrobial policies on microbial communities."

  - icon: "food"
    title: "Sustainable Food Systems & Agriculture"
    description: "Developing AI solutions and computational approaches to transform agri-food systems for sustainability and resilience."
    tags: ["AI", "Agriculture", "Livestock", "Food Security"]
    subtopics:
      - title: "AI-Driven Agricultural Innovation"
        description: "Applying machine learning and large-scale microbiomics to develop intelligent solutions for sustainable food production."
      - title: "Livestock Production Optimisation"
        description: "Computational approaches to improve animal health, productivity, and reduce environmental footprint across farming systems."
      - title: "Rumen Microbiome"
        description: "Characterising the complex microbial communities of the rumen to understand their role in feed efficiency, animal health, and methane emissions. Using tools such as CowPI and the HoloRuminant framework to integrate metataxonomic and metagenomic data."

  - icon: "environment"
    title: "Environmental Microbiology & Biotechnology"
    description: "Exploring bacteriophage applications and methanogen biology to address environmental challenges and climate change."
    tags: ["Phage Therapy", "Metagenomics", "Climate", "Methanogens"]
    subtopics:
      - title: "Phage Therapy & Environmental Management"
        description: "Harnessing bacteriophages for sustainable environmental biotechnology and novel therapeutic applications against drug-resistant pathogens."
      - title: "Methanogen Biology & Climate Change"
        description: "Investigating methane-producing microorganisms to understand and mitigate greenhouse gas emissions from agriculture and the environment."

  - icon: "phylogenomics"
    title: "Phylogenomics"
    description: "Reconstructing evolutionary histories and inferring relationships across the tree of life using large-scale genomic datasets and novel computational approaches."
    tags: ["Phylogenetics", "Comparative Genomics", "Evolution", "Supertrees"]
    subtopics:
      - title: "Supertree & Supermatrix Methods"
        description: "Developing and applying methods for combining partially overlapping phylogenetic datasets, including supertree construction and supermatrix concatenation, implemented in tools such as Clann and CatSequences."
      - title: "Phylogenomic Inference & Adaptive Evolution"
        description: "Large-scale inference of evolutionary relationships and detection of adaptive evolution across protein-coding genes, using methods implemented in Crann, Clan Check, and Machete."

  - icon: "methods"
    title: "Methodological Development"
    description: "Creating novel bioinformatics tools, pipelines, and multi-omics integration approaches for microbiome and genomics research."
    tags: ["Bioinformatics", "Tools", "Multi-Omics", "Pipelines"]
    subtopics:
      - title: "Computational Tool Development"
        description: "Building open-source bioinformatics software for phylogenetic analysis, metagenomics pipelines, machine learning frameworks, and comparative genomics."
      - title: "Multi-Omics Integration"
        description: "Developing approaches to integrate metataxonomic, metagenomic, proteomic, and genomic data for comprehensive systems biology insights."
